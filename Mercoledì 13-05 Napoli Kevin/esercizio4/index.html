<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- container: griglia principale con 3 colonne uguali -->
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

    <!-- container1: layout flex orizzontale con spazio tra gli elementi -->
    <div class="container1">
        <div class="item1">1</div>
        <div class="item1">2</div>
        <div class="item1">3</div>
    </div>

    <!-- container2: griglia con elementi posizionati esplicitamente -->
    <div class="container2">
        <div class="itemA itemB">A</div>
        <div class="itemA itemB">B</div>
        <div class="itemB">C</div>
    </div>

    <!-- container3: layout a griglia con aree nominate (header, sidebar, content, footer) -->
    <div class="container3">
        <div class="header">Header</div>
        <div class="sidebar">Sidebar</div>
        <div class="content">Content</div>
        <div class="footer">Footer</div>
    </div>

</body>

</html>
